# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Language
lang: en

# Timezone
timezone: Asia/Shanghai

# jekyll-seo-tag settings
title: Taniec Śniegu
tagline: Né libre et singulier
description: >-
  A personal blog about mathematics, physics, programming, music, language learning and life.

url: "https://taniecsniegu.net"
baseurl: ""

github:
  username: Flockenwirbel

social:
  name: Lorenz Fedor Klemens de Memel
  email:
  links:
    - https://github.com/Flockenwirbel
    - https://www.zhihu.com/people/naclo-83
    - https://space.bilibili.com/508466231

# Color scheme: empty = system preference with toggle
theme_mode:

# Avatar on sidebar
avatar: /assets/img/favicons/Katze.svg

# TOC in posts
toc: true

# Comments (disabled for now)
comments:
  provider:

# PWA
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: true
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
